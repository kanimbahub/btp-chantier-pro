<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTP Chantier Pro — Nouveau mot de passe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
[data-theme="dark"]{--bg:#0e1510;--bg2:#141e15;--bg3:#1a2a1c;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e4ece5;--text2:#7d9e80;--text3:#4a6b4d;}
[data-theme="light"]{--bg:#f4f7f4;--bg2:#ffffff;--bg3:#edf2ed;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a2b1c;--text2:#4a6e4d;--text3:#8aaa8d;}
:root{--green:#3dba6a;--red:#e8524a;--font:'DM Sans',sans-serif;--radius:10px;--radius-lg:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
button,input{outline:none;font-family:var(--font);}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:400px;padding:20px;}
.logo-box{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;border-radius:14px;background:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;}
.logo-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.logo-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;}
.card-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--green);}
.btn{width:100%;background:var(--green);color:#fff;border:none;padding:12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity 0.15s;}
.btn:hover{opacity:0.88;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.msg{border-radius:var(--radius);padding:10px 14px;font-size:13px;margin-bottom:14px;display:none;}
.msg.error{background:rgba(232,82,74,0.1);border:1px solid rgba(232,82,74,0.3);color:var(--red);}
.msg.success{background:rgba(61,186,106,0.1);border:1px solid rgba(61,186,106,0.3);color:var(--green);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-box">
    <div class="logo-icon">🏗</div>
    <div class="logo-title">BTP Chantier Pro</div>
    <div class="logo-sub">Afrique de l'Ouest — Gestion de chantiers</div>
  </div>
  <div class="card">
    <div class="card-title">Nouveau mot de passe</div>
    <div class="card-sub">Choisissez un nouveau mot de passe sécurisé.</div>
    <div class="msg" id="msg"></div>
    <div class="form-group">
      <label>Nouveau mot de passe</label>
      <input type="password" id="pw-new" class="form-input" placeholder="Minimum 8 caractères">
    </div>
    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="pw-confirm" class="form-input" placeholder="Répéter le mot de passe">
    </div>
    <button class="btn" id="btn-reset" onclick="resetPassword()">Enregistrer le nouveau mot de passe</button>
  </div>
</div>

<script>
const{createClient}=supabase
const db=createClient('https://aktwkafyzrujqgvojolx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrdHdrYWZ5enJ1anFndm9qb2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTY2MDAsImV4cCI6MjA4OTI3MjYwMH0.OLBuhijTx3lRK5VofjxmoplGgQ1UsxbgIs3igj2hGpM')

function showMsg(msg,type='error'){
  const el=document.getElementById('msg')
  el.className='msg '+type
  el.textContent=msg
  el.style.display='block'
}

async function resetPassword(){
  const pw=document.getElementById('pw-new').value
  const cf=document.getElementById('pw-confirm').value
  if(!pw||pw.length<8){showMsg('Minimum 8 caractères');return}
  if(pw!==cf){showMsg('Les mots de passe ne correspondent pas');return}
  const btn=document.getElementById('btn-reset')
  btn.disabled=true;btn.textContent='Enregistrement...'
  const{error}=await db.auth.updateUser({password:pw})
  if(error){
    showMsg(error.message)
    btn.disabled=false;btn.textContent='Enregistrer le nouveau mot de passe'
    return
  }
  showMsg('Mot de passe mis à jour ! Redirection...','success')
  setTimeout(()=>window.location.href='login.html',2000)
}

// Vérifier que le token est présent dans l'URL
db.auth.onAuthStateChange((event,session)=>{
  if(event==='PASSWORD_RECOVERY'){
    showMsg('Vous pouvez maintenant définir votre nouveau mot de passe.','success')
  }
})
</script>
</body>
</html>
