<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTP Chantier Pro — Connexion</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3dba6a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="BTP Pro">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
[data-theme="dark"]{--bg:#0e1510;--bg2:#141e15;--bg3:#1a2a1c;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e4ece5;--text2:#7d9e80;--text3:#4a6b4d;}
[data-theme="light"]{--bg:#f4f7f4;--bg2:#ffffff;--bg3:#edf2ed;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);--text:#1a2b1c;--text2:#4a6e4d;--text3:#8aaa8d;}
:root{--green:#3dba6a;--green-l:#eaf7ef;--green-d:#0f2e18;--red:#e8524a;--font:'DM Sans',sans-serif;--radius:10px;--radius-lg:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:400px;padding:20px;}
.logo-box{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;border-radius:14px;background:var(--green);display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;}
.logo-title{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.logo-sub{font-size:13px;color:var(--text2);margin-top:4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;}
.form-group{margin-bottom:14px;}
.form-group label{font-size:11px;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--green);}
.btn-login{width:100%;background:var(--green);color:#fff;border:none;padding:12px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity 0.15s;}
.btn-login:hover{opacity:0.88;}
.btn-login:disabled{opacity:0.5;cursor:not-allowed;}
.error-box{background:rgba(232,82,74,0.1);border:1px solid rgba(232,82,74,0.3);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none;}
.divider{text-align:center;font-size:12px;color:var(--text3);margin:16px 0;}
.btn-register{width:100%;background:transparent;color:var(--text2);border:1px solid var(--border2);padding:10px;border-radius:var(--radius);font-family:var(--font);font-size:13px;cursor:pointer;transition:all 0.15s;}
.btn-register:hover{border-color:var(--green);color:var(--green);}
.toggle-theme{position:fixed;top:16px;right:16px;background:var(--bg2);border:1px solid var(--border2);color:var(--text2);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<button class="toggle-theme" onclick="toggleTheme()" id="theme-btn">☀️ Clair</button>
<div class="login-wrap">
  <div class="logo-box">
    <div class="logo-icon">🏗</div>
    <div class="logo-title">BTP Chantier Pro</div>
    <div class="logo-sub">Afrique de l'Ouest — Gestion de chantiers</div>
  </div>
  <div class="card" id="card-login">
    <div class="error-box" id="error-box"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" class="form-input" placeholder="admin@btppro.gn" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btn-login" onclick="login()">Se connecter →</button>
    <div class="divider">ou</div>
    <button class="btn-register" onclick="showRegister()">Créer un compte entreprise</button>
  </div>

  <div class="card" id="card-register" style="display:none;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
      <button onclick="showLogin()" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;">←</button>
      <span style="font-size:15px;font-weight:600;">Créer un compte</span>
    </div>
    <div class="error-box" id="error-box-reg"></div>
    <div class="form-group"><label>Nom de l'entreprise</label><input type="text" id="reg-entreprise" class="form-input" placeholder="BTP Pro Conakry"></div>
    <div class="form-group"><label>Email *</label><input type="email" id="reg-email" class="form-input" placeholder="contact@btppro.gn"></div>
    <div class="form-group"><label>Mot de passe *</label><input type="password" id="reg-password" class="form-input" placeholder="Min. 8 caractères"></div>
    <div class="form-group"><label>Confirmer le mot de passe</label><input type="password" id="reg-confirm" class="form-input" placeholder="Répéter le mot de passe"></div>
    <button class="btn-login" id="btn-register" onclick="register()">Créer mon compte →</button>
  </div>
</div>

<script>
const{createClient}=supabase
const db=createClient('https://aktwkafyzrujqgvojolx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrdHdrYWZ5enJ1anFndm9qb2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTY2MDAsImV4cCI6MjA4OTI3MjYwMH0.OLBuhijTx3lRK5VofjxmoplGgQ1UsxbgIs3igj2hGpM')

function toggleTheme(){
  const h=document.documentElement,d=h.dataset.theme==='dark'
  h.dataset.theme=d?'light':'dark'
  document.getElementById('theme-btn').textContent=d?'🌙 Sombre':'☀️ Clair'
}

function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block'}
function hideError(id){document.getElementById(id).style.display='none'}
function showLogin(){document.getElementById('card-login').style.display='block';document.getElementById('card-register').style.display='none'}
function showRegister(){document.getElementById('card-login').style.display='none';document.getElementById('card-register').style.display='block'}

async function login(){
  const email=document.getElementById('email').value
  const password=document.getElementById('password').value
  if(!email||!password){showError('error-box','Email et mot de passe obligatoires');return}
  const btn=document.getElementById('btn-login')
  btn.disabled=true;btn.textContent='Connexion...'
  hideError('error-box')
  const{error}=await db.auth.signInWithPassword({email,password})
  if(error){
    showError('error-box',error.message==='Invalid login credentials'?'Email ou mot de passe incorrect':error.message)
    btn.disabled=false;btn.textContent='Se connecter →'
    return
  }
  window.location.href='index.html'
}

async function register(){
  const entreprise=document.getElementById('reg-entreprise').value
  const email=document.getElementById('reg-email').value
  const password=document.getElementById('reg-password').value
  const confirm=document.getElementById('reg-confirm').value
  if(!email||!password){showError('error-box-reg','Email et mot de passe obligatoires');return}
  if(password.length<8){showError('error-box-reg','Mot de passe minimum 8 caractères');return}
  if(password!==confirm){showError('error-box-reg','Les mots de passe ne correspondent pas');return}
  const btn=document.getElementById('btn-register')
  btn.disabled=true;btn.textContent='Création...'
  hideError('error-box-reg')
  const{data,error}=await db.auth.signUp({email,password,options:{data:{entreprise_nom:entreprise}}})
  if(error){
    showError('error-box-reg',error.message)
    btn.disabled=false;btn.textContent='Créer mon compte →'
    return
  }
  if(entreprise){
    await db.from('entreprises').insert({nom:entreprise,email,pays:'Guinée'})
  }
  window.location.href='index.html'
}

// Vérifier si déjà connecté
db.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='index.html'
})

// Enter pour se connecter
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('card-login').style.display!=='none') login()
    else register()
  }
})
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").then(()=>console.log("SW OK")).catch(e=>console.log("SW erreur",e))}</script>
</body>
</html>
